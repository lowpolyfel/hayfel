<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overlay 08 Waves</title>
  <link rel="stylesheet" href="../assets/css/scene-base.css" />
  <link rel="stylesheet" href="../assets/css/scene8-waves-only.css" />
</head>
<body>
  <div class="overlay theme-08" aria-label="Overlay de olas flotante">
    <div class="wave-layer">
      <svg viewBox="0 0 600 140" preserveAspectRatio="none" aria-hidden="true"></svg>
    </div>
    <div class="hayfel-title" aria-hidden="true">hayfel</div>
  </div>

  <div class="mode-strip" aria-label="Selector de modos visuales">
    <button class="mode-btn" data-mode="normal" aria-label="Modo normal"></button>
    <button class="mode-btn" data-mode="physics" aria-label="Modo fisicas 3D"></button>
    <button class="mode-btn" data-mode="vhs" aria-label="Modo VHS vintage"></button>
    <button class="mode-btn" data-mode="title" aria-label="Modo texto HAYFEL"></button>
  </div>

  <button class="hidden-scene-btn" data-next-scene="scene1.html" aria-label="Cambiar a la siguiente escena"></button>
  <script src="../assets/js/scene-router.js"></script>
  <script src="../assets/js/scene8-modes.js"></script>
</body>
</html>
